 <!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouw Herstel Tool</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #edf2f7;
      color: #1f2937;
    }
    .app {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 320px;
      background: #18344f;
      color: #fff;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
    }
    .logo {
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 28px;
    }
    .project-label {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    .project-name {
      font-size: 19px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.8;
      margin: 18px 0 8px;
    }
    .nav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-radius: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-item:hover,
    .nav-item.active {
      background: rgba(255,255,255,0.10);
    }
    .nav-left {
      font-size: 18px;
    }
    .count {
      font-size: 15px;
      color: #b7c6d4;
    }
    .main {
      flex: 1;
      padding: 32px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .topbar h1 {
      margin: 0;
      font-size: 30px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary {
      background: #1f7ae0;
      color: white;
    }
    .btn-secondary {
      background: white;
      color: #1f2937;
      border: 1px solid #d9e1ea;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    .card h2, .card h3 {
      margin-top: 0;
    }
    .zones {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .zone {
      background: #f3f7fb;
      border: 2px solid #dbe6f0;
      border-radius: 14px;
      padding: 18px;
      min-height: 100px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }
    .zone:hover {
      transform: translateY(-2px);
      border-color: #7fb0e8;
    }
    .zone.active {
      border-color: #1f7ae0;
      box-shadow: 0 0 0 3px rgba(31,122,224,0.10);
      background: #eef6ff;
    }
    .zone strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .muted {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }
    .ticket-box {
      background: #f9fbfd;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }
    .phase-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .phase {
      background: #f8fafc;
      border: 1px solid #e4ebf2;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .phase-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .status-box {
      background: #fff8dd;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #f0e1a6;
    }
    .tag {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef3f8;
      margin: 6px 6px 0 0;
      font-size: 14px;
    }
    .mini-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid #edf2f7;
      font-size: 15px;
    }
    .mini-line:last-child {
      border-bottom: none;
    }
    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .sidebar {
        width: 280px;
      }
    }
